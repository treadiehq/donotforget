name: Update version Gist on release

on:
  release:
    types: [published]

jobs:
  update-gist:
    runs-on: ubuntu-latest
    steps:
      - name: Build version.json and update Gist
        env:
          GIST_ID: 7c141e24257a278783e5651b74f3f7b8
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          RELEASE_URL="${{ github.event.release.html_url }}"

          # Find the arm64 DMG asset download URL
          DOWNLOAD_URL=$(echo '${{ toJson(github.event.release.assets) }}' \
            | jq -r '.[] | select(.name | test("arm64.*\\.dmg$")) | .browser_download_url' \
            | head -1)

          # Fall back to release page if no DMG asset found
          if [ -z "$DOWNLOAD_URL" ]; then
            DOWNLOAD_URL="$RELEASE_URL"
          fi

          PAYLOAD=$(jq -n \
            --arg version "$VERSION" \
            --arg url "$RELEASE_URL" \
            --arg downloadUrl "$DOWNLOAD_URL" \
            '{version: $version, url: $url, downloadUrl: $downloadUrl}')

          curl -s -X PATCH \
            -H "Authorization: token $GIST_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"files\":{\"version.json\":{\"content\":$(echo $PAYLOAD | jq -Rs .)}}}" \
            "https://api.github.com/gists/$GIST_ID"
